{% set name = environ.get('ANACONDA_PACKAGE', "root-plus")|string|lower %}

{% set versions = {
    "beta": "7033cc9ab5e01cef67f8ce17d815142f48cf7201",
    "alpha": "be02f507e90727eaa5134f9ccea6c75dbb17d813",
} %}

{% set version = environ.get('COMMIT_VERSION', None) %}
{% set version = version or versions.keys()|first %}
{% set version = version|string %}

{% set libtorch = libtorch if libtorch else "0" %}
{% set root = root if root else "0" %}

build:
  number: 0
  string: "torch{{ libtorch.replace('.', '') }}_root{{ root.replace('.', '') }}"
  ignore_run_exports_from:
    - tbb
    - tbb-devel
  # max_pin="x.x.x" tries to compute an upper bound by numerically
  # incrementing the version, which crashes (ValueError: invalid
  # literal for int()) for non-numeric versions like "beta"/"alpha" --
  # this package's actual version scheme. max_pin=None pins the lower
  # bound only, skipping that computation entirely.
  run_exports:
    - {{ pin_subpackage(name, max_pin=None) }}

package:
  name: {{ name }}
  version: {{ environ.get('ANACONDA_VERSION', version)|replace("-", ".") }}

source:
  git_url: "https://git.ligo.org/kagra/libraries-addons/root/root-plus"
  # feedstock version tags (e.g. 1.0.0) map to upstream commits; fall
  # back to the raw ref for upstream tag names like alpha/beta
  git_rev: {{ versions.get(version, version) }}

requirements:
  build:
    - root {{ root }}.*

    - clang
    - cmake
    - make


  host:
    - root {{ root }}.*

    # cpu build glob: the solver otherwise picks CUDA libtorch, whose
    # Caffe2 cmake config then demands the CUDA toolkit at build time
    - libtorch {{ libtorch }}.* cpu*

    - minio-cpp>=0.3
    - libdate-tz
    - libarchive
    - onnxruntime-cpp
    - tbb
    - tbb-devel

    - hdf5
    - librdkafka
    - inih
    - curl
    - nlohmann_json
    - tomlplusplus
    - libxml2
    - yaml-cpp

  run:
    - root {{ root }}.*
    - libtorch {{ libtorch }}.* cpu*

    - minio-cpp>=0.3
    - libdate-tz
    - libarchive
    - onnxruntime-cpp
    - tbb
    - tbb-devel

    - hdf5
    - librdkafka
    - inih
    - curl
    - nlohmann_json
    - tomlplusplus
    - libxml2
    - yaml-cpp

about:
  home: "https://git.ligo.org/kagra/libraries-addons/root/root-plus"
  license: "GPL-3.0"
  summary: "ROOT+ for Tensor Calculation & Advanced Signal Processing"
  description: |
    ROOT+ is an Open-Source library implementing complex tensor calculation, advanced signal processing. It can be used for scientific Machine Learning developments in C/C++"

extra:
  recipe-maintainers:
    - meiyasan
  # "beta" is this package's actual released version, not a disposable
  # dev build -- protect it from the channel trim step the same way a
  # numeric release would be (see scripts/templates/autoupload.yml).
  release_tags:
    main:
      - beta
